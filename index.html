<title>Quiniela 2030 · Yalla Vamos</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;width:100%}
  body{
    min-height:100vh;
    background:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    color:#111;
    overflow-x:hidden;
  }
  .stars{display:none}
  .wrapper{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px 20px 24px;min-height:100vh}
  .logo-wrap{display:flex;align-items:center;justify-content:center}
  .logo-img{width:auto;max-width:min(240px,65vw);max-height:min(45vh,360px);height:auto;object-fit:contain;}

      /* Countdown — refinado */
  .next-label{
    font-size:.65rem;font-weight:700;letter-spacing:.3em;text-transform:uppercase;
    color:rgba(0,0,0,.22);margin-bottom:-2px;
  }
  .countdown{
    display:flex;gap:7px;flex-wrap:nowrap;justify-content:center;
    padding:0 12px;
  }
  .cd-unit{
    display:flex;flex-direction:column;align-items:center;
    gap:2px;
    background:transparent;
    padding:4px 0 4px;
    flex:1;max-width:78px;min-width:0;
  }
  .cd-val{
    font-size:min(2.1rem,6.2vw);font-weight:650;line-height:1;
    font-variant-numeric:tabular-nums;
    min-width:2ch;text-align:center;
    color:#1a1a2e;
  }
  .cd-lbl{
    font-size:min(.5rem,1.6vw);font-weight:700;letter-spacing:.12em;
    text-transform:uppercase;color:rgba(0,0,0,.28);
  }
  .subtitle{
    font-size:.7rem;color:rgba(0,0,0,.22);letter-spacing:.06em;
    margin-top:-4px;
  }
  .flags-row{display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:nowrap;}
  .fi{width:28px;height:21px;border-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.15);flex-shrink:0;}
</style>
</head>

<script>
// Target: June 14 2030 1pm CDMX (UTC-6)
const target = new Date('2030-06-14T19:00:00Z');

function pad(n){return String(n).padStart(2,'0')}

function tick(){
  const now=new Date();
  let diff=target-now;
  if(diff<=0){
    ['y','mo','d','h','m','s'].forEach(id=>document.getElementById('cd-'+id).textContent='00');
    return;
  }
  const totalSec=Math.floor(diff/1000);
  const totalMin=Math.floor(totalSec/60);
  const totalHr =Math.floor(totalMin/60);
  const totalDays=Math.floor(totalHr/24);

  // Months + years approximation
  const nowD=new Date(now);
  const tgtD=new Date(target);
  let years=tgtD.getFullYear()-nowD.getFullYear();
  let months=tgtD.getMonth()-nowD.getMonth();
  if(months<0){years--;months+=12;}
  // remaining days after full months
  const afterMonths=new Date(nowD);
  afterMonths.setFullYear(afterMonths.getFullYear()+years);
  afterMonths.setMonth(afterMonths.getMonth()+months);
  let remDiff=target-afterMonths;
  if(remDiff<0){months--;if(months<0){years--;months+=12;}afterMonths.setMonth(afterMonths.getMonth()-1);remDiff=target-afterMonths;}
  const remSec=Math.floor(remDiff/1000);
  const remMin=Math.floor(remSec/60);
  const remHr =Math.floor(remMin/60);
  const remDays=Math.floor(remHr/24);
  const remHrsLeft=remHr%24;
  const remMinsLeft=remMin%60;
  const remSecsLeft=remSec%60;

  document.getElementById('cd-y').textContent=pad(years);
  document.getElementById('cd-mo').textContent=pad(months);
  document.getElementById('cd-d').textContent=pad(remDays);
  document.getElementById('cd-h').textContent=pad(remHrsLeft);
  document.getElementById('cd-m').textContent=pad(remMinsLeft);
  document.getElementById('cd-s').textContent=pad(remSecsLeft);
}
tick();
setInterval(tick,1000);
</script>
