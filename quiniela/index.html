<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiniela — Quiniela Entre Amigos Mundial 2026</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root{
  --bg:#f0f4f8;--surface:#fff;--surface2:#f7f9fc;
  --navy:#0d1f3c;--navy2:#1a3358;--green:#00a550;--green2:#00c060;
  --green-light:#e6f9ee;--gold:#f59e0b;--gold-light:#fef3c7;
  --text:#1a2333;--muted:#64748b;--border:#e2e8f0;
  --red:#ef4444;--shadow:0 1px 4px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.06);
}
body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:linear-gradient(110deg,var(--navy) 0%,var(--navy2) 60%,#1e4a7a 100%);border-bottom:4px solid var(--green);position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.18)}
.hdr{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:58px;gap:12px}
.logo{display:flex;align-items:center;gap:8px;font-size:1rem;font-weight:900;color:#fff}
.logo-ball{width:30px;height:30px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:0 0 0 3px rgba(0,197,96,.3)}
.btn-back{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);cursor:pointer;font-size:.82rem;font-weight:600;text-decoration:none;transition:background .18s}
.btn-back:hover{background:rgba(255,255,255,.22)}
main{max-width:900px;margin:0 auto;padding:24px 16px}
/* Loading */
#loading-bar{position:fixed;top:0;left:0;right:0;height:3px;background:var(--green);z-index:9999;transition:width .4s}
#loading-bar.done{opacity:0;transition:opacity .5s}
/* Profile card */
.profile-card{background:var(--surface);border-radius:16px;padding:20px 24px;margin-bottom:20px;box-shadow:var(--shadow);display:flex;align-items:center;gap:18px;flex-wrap:wrap}
.profile-avatar{width:56px;height:56px;background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:900;color:#fff;flex-shrink:0}
.profile-info{flex:1;min-width:0}
.profile-apodo{font-size:1.4rem;font-weight:900;color:var(--navy)}
.profile-nombre{font-size:.85rem;color:var(--muted);margin-top:2px}
.stats-row{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px}
.stat-item{display:flex;flex-direction:column;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 14px;min-width:70px}
.stat-val{font-size:1.3rem;font-weight:900;line-height:1}
.stat-label{font-size:.62rem;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.stat-green{color:var(--green)}
.stat-gold{color:var(--gold)}
.stat-blue{color:#0369a1}
/* Sections */
.section{background:var(--surface);border-radius:14px;margin-bottom:16px;box-shadow:var(--shadow);overflow:hidden}
.section-header{display:flex;align-items:center;gap:8px;padding:14px 18px;background:var(--navy);color:#fff;font-size:.9rem;font-weight:800}
.section-body{padding:16px 18px}
/* Group blocks */
.group-block{margin-bottom:18px}
.group-block:last-child{margin-bottom:0}
.group-title{font-size:.65rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;padding-bottom:4px;border-bottom:1.5px solid var(--border)}
.match-row{display:flex;align-items:center;padding:6px 0;border-bottom:1px solid #f1f5f9;gap:8px}
.match-row:last-child{border-bottom:none}
.match-teams{flex:1;font-size:.75rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.match-pred{flex-shrink:0;display:flex;align-items:center;gap:5px}
.score-pill{display:inline-block;padding:2px 8px;border-radius:6px;background:#f1f5f9;border:1px solid #dde3ec;font-weight:700;font-size:.8rem;min-width:38px;text-align:center}
.score-pill.empty{color:#c0cad8;font-weight:400;border:1px dashed #dde3ec}
.result-badge{font-size:.68rem;font-weight:700;color:var(--green2)}
.pts{display:inline-block;padding:2px 6px;border-radius:5px;font-size:.68rem;font-weight:800}
.pts-3{background:var(--green);color:#fff}
.pts-1{background:var(--gold);color:#fff}
.pts-0{background:#e2e8f0;color:#94a3b8}
/* KO rounds */
.ko-round{margin-bottom:18px}
.ko-round:last-child{margin-bottom:0}
.ko-round-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ko-round-label{font-size:.7rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.ko-pts-badge{font-size:.72rem;font-weight:800;padding:3px 10px;border-radius:10px}
.ko-pts-badge.with-pts{background:var(--green-light);color:var(--green);border:1px solid var(--green)}
.ko-pts-badge.pending{background:var(--gold-light);color:var(--gold);border:1px solid var(--gold)}
.ko-pills{display:flex;flex-wrap:wrap;gap:5px}
.ko-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:12px;font-size:.76rem;font-weight:600}
.ko-pill.correct{background:var(--green-light);border:1.5px solid var(--green);color:#005c2a}
.ko-pill.wrong{background:#f1f5f9;border:1.5px solid #ccc;color:#999;text-decoration:line-through;text-decoration-color:#444;text-decoration-thickness:2px}
.ko-pill.neutral{background:var(--surface2);border:1.5px solid var(--border);color:var(--text)}
/* Not found */
.not-found{text-align:center;padding:60px 20px;color:var(--muted)}
.not-found h2{font-size:1.2rem;margin-bottom:8px;color:var(--text)}
/* fi flags */
.fi{display:inline-block!important;background-size:cover;background-position:center;border-radius:2px;width:14px;height:11px;vertical-align:middle;margin-right:2px}
/* Mobile */
@media(max-width:600px){
  main{padding:16px 10px}
  .profile-card{padding:14px 16px;gap:12px}
  .profile-avatar{width:44px;height:44px;font-size:1.2rem}
  .profile-apodo{font-size:1.15rem}
  .section-body{padding:12px 14px}
  .match-teams{font-size:.7rem}
  .score-pill{font-size:.74rem;min-width:32px;padding:2px 5px}
  .stats-row{gap:8px}
  .stat-item{padding:6px 10px;min-width:60px}
  .stat-val{font-size:1.1rem}
}
</style>
</head>
<body>
<div id="loading-bar" style="width:50%"></div>
<header>

</header>
<main id="main">
  <div class="not-found"><h2>Cargando...</h2></div>
</main>

<script>
firebase.initializeApp({
  apiKey:'AIzaSyBbaCAODAbhgjSEUaA8Hzf31vf8K6ek1zU',
  authDomain:'quiniela2026-9784f.firebaseapp.com',
  databaseURL:'https://quiniela2026-9784f-default-rtdb.firebaseio.com',
  projectId:'quiniela2026-9784f',
  storageBucket:'quiniela2026-9784f.firebasestorage.app',
  messagingSenderId:'386303908707',
  appId:'1:386303908707:web:d36ce736e974f13e871156'
});

const apodo=new URLSearchParams(location.search).get('p')||'';
if(apodo)document.title=apodo+' — Quiniela Entre Amigos Mundial 2026';

const DEFAULT_TEAMS={
  A:['México','Corea del Sur','Sudáfrica','Rep. Checa'],
  B:['Canadá','Bosnia-Herzegovina','Catar','Suiza'],
  C:['Brasil','Marruecos','Haití','Escocia'],
  D:['Estados Unidos','Paraguay','Australia','Turquía'],
  E:['Alemania','Curazao','Costa de Marfil','Ecuador'],
  F:['Países Bajos','Japón','Suecia','Túnez'],
  G:['Bélgica','Egipto','Irán','Nueva Zelanda'],
  H:['España','Cabo Verde','Arabia Saudita','Uruguay'],
  I:['Francia','Senegal','Irak','Noruega'],
  J:['Argentina','Austria','Argelia','Jordania'],
  K:['Portugal','Colombia','Rep. Dem. Congo','Uzbekistán'],
  L:['Inglaterra','Croacia','Ghana','Panamá']
};
const DEFAULT_MATCHES=[{id:'A1',group:'A',matchday:1,date:'11 Jun',hi:0,ai:2},{id:'A2',group:'A',matchday:1,date:'11 Jun',hi:1,ai:3},{id:'A3',group:'A',matchday:2,date:'18 Jun',hi:0,ai:1},{id:'A4',group:'A',matchday:2,date:'18 Jun',hi:3,ai:2},{id:'A5',group:'A',matchday:3,date:'24 Jun',hi:0,ai:3},{id:'A6',group:'A',matchday:3,date:'24 Jun',hi:1,ai:2},{id:'B1',group:'B',matchday:1,date:'12 Jun',hi:0,ai:1},{id:'B2',group:'B',matchday:1,date:'13 Jun',hi:2,ai:3},{id:'B3',group:'B',matchday:2,date:'18 Jun',hi:3,ai:1},{id:'B4',group:'B',matchday:2,date:'18 Jun',hi:0,ai:2},{id:'B5',group:'B',matchday:3,date:'24 Jun',hi:0,ai:3},{id:'B6',group:'B',matchday:3,date:'24 Jun',hi:1,ai:2},{id:'C1',group:'C',matchday:1,date:'13 Jun',hi:0,ai:1},{id:'C2',group:'C',matchday:1,date:'13 Jun',hi:2,ai:3},{id:'C3',group:'C',matchday:2,date:'19 Jun',hi:0,ai:2},{id:'C4',group:'C',matchday:2,date:'19 Jun',hi:3,ai:1},{id:'C5',group:'C',matchday:3,date:'26 Jun',hi:0,ai:3},{id:'C6',group:'C',matchday:3,date:'26 Jun',hi:1,ai:2},{id:'D1',group:'D',matchday:1,date:'12 Jun',hi:0,ai:1},{id:'D2',group:'D',matchday:1,date:'13 Jun',hi:2,ai:3},{id:'D3',group:'D',matchday:2,date:'19 Jun',hi:0,ai:2},{id:'D4',group:'D',matchday:2,date:'19 Jun',hi:3,ai:1},{id:'D5',group:'D',matchday:3,date:'25 Jun',hi:0,ai:3},{id:'D6',group:'D',matchday:3,date:'25 Jun',hi:1,ai:2},{id:'E1',group:'E',matchday:1,date:'14 Jun',hi:0,ai:1},{id:'E2',group:'E',matchday:1,date:'14 Jun',hi:2,ai:3},{id:'E3',group:'E',matchday:2,date:'20 Jun',hi:0,ai:2},{id:'E4',group:'E',matchday:2,date:'20 Jun',hi:3,ai:1},{id:'E5',group:'E',matchday:3,date:'25 Jun',hi:0,ai:3},{id:'E6',group:'E',matchday:3,date:'25 Jun',hi:1,ai:2},{id:'F1',group:'F',matchday:1,date:'14 Jun',hi:0,ai:1},{id:'F2',group:'F',matchday:1,date:'15 Jun',hi:2,ai:3},{id:'F3',group:'F',matchday:2,date:'20 Jun',hi:0,ai:2},{id:'F4',group:'F',matchday:2,date:'21 Jun',hi:3,ai:1},{id:'F5',group:'F',matchday:3,date:'25 Jun',hi:0,ai:3},{id:'F6',group:'F',matchday:3,date:'25 Jun',hi:1,ai:2},{id:'G1',group:'G',matchday:1,date:'15 Jun',hi:0,ai:1},{id:'G2',group:'G',matchday:1,date:'15 Jun',hi:2,ai:3},{id:'G3',group:'G',matchday:2,date:'21 Jun',hi:0,ai:2},{id:'G4',group:'G',matchday:2,date:'21 Jun',hi:3,ai:1},{id:'G5',group:'G',matchday:3,date:'26 Jun',hi:0,ai:3},{id:'G6',group:'G',matchday:3,date:'26 Jun',hi:1,ai:2},{id:'H1',group:'H',matchday:1,date:'15 Jun',hi:0,ai:1},{id:'H2',group:'H',matchday:1,date:'15 Jun',hi:2,ai:3},{id:'H3',group:'H',matchday:2,date:'21 Jun',hi:0,ai:2},{id:'H4',group:'H',matchday:2,date:'21 Jun',hi:3,ai:1},{id:'H5',group:'H',matchday:3,date:'26 Jun',hi:0,ai:3},{id:'H6',group:'H',matchday:3,date:'26 Jun',hi:1,ai:2},{id:'I1',group:'I',matchday:1,date:'16 Jun',hi:0,ai:1},{id:'I2',group:'I',matchday:1,date:'16 Jun',hi:2,ai:3},{id:'I3',group:'I',matchday:2,date:'22 Jun',hi:0,ai:2},{id:'I4',group:'I',matchday:2,date:'22 Jun',hi:3,ai:1},{id:'I5',group:'I',matchday:3,date:'26 Jun',hi:0,ai:3},{id:'I6',group:'I',matchday:3,date:'26 Jun',hi:1,ai:2},{id:'J1',group:'J',matchday:1,date:'16 Jun',hi:0,ai:2},{id:'J2',group:'J',matchday:1,date:'16 Jun',hi:1,ai:3},{id:'J3',group:'J',matchday:2,date:'22 Jun',hi:0,ai:1},{id:'J4',group:'J',matchday:2,date:'22 Jun',hi:2,ai:3},{id:'J5',group:'J',matchday:3,date:'26 Jun',hi:0,ai:3},{id:'J6',group:'J',matchday:3,date:'26 Jun',hi:1,ai:2},{id:'K1',group:'K',matchday:1,date:'17 Jun',hi:0,ai:2},{id:'K2',group:'K',matchday:1,date:'17 Jun',hi:3,ai:1},{id:'K3',group:'K',matchday:2,date:'23 Jun',hi:0,ai:1},{id:'K4',group:'K',matchday:2,date:'23 Jun',hi:2,ai:3},{id:'K5',group:'K',matchday:3,date:'27 Jun',hi:0,ai:3},{id:'K6',group:'K',matchday:3,date:'27 Jun',hi:1,ai:2},{id:'L1',group:'L',matchday:1,date:'17 Jun',hi:0,ai:1},{id:'L2',group:'L',matchday:1,date:'17 Jun',hi:2,ai:3},{id:'L3',group:'L',matchday:2,date:'23 Jun',hi:0,ai:2},{id:'L4',group:'L',matchday:2,date:'23 Jun',hi:3,ai:1},{id:'L5',group:'L',matchday:3,date:'27 Jun',hi:0,ai:3},{id:'L6',group:'L',matchday:3,date:'27 Jun',hi:1,ai:2}];
const KNOCKOUT_ROUNDS=[
  {id:'r16',label:'16vos de Final',count:32,pts:1},
  {id:'r8', label:'Octavos de Final',count:16,pts:1},
  {id:'r4', label:'Cuartos de Final',count:8, pts:1},
  {id:'r2', label:'Semifinal',       count:4, pts:2},
  {id:'rf', label:'Final',           count:2, pts:3},
  {id:'rc', label:'Campeón',         count:1, pts:5}
];
const TEAM_CODES={'México':'mx','Corea del Sur':'kr','Sudáfrica':'za','Rep. Checa':'cz','Canadá':'ca','Bosnia-Herzegovina':'ba','Catar':'qa','Suiza':'ch','Brasil':'br','Marruecos':'ma','Haití':'ht','Escocia':'gb-sct','Estados Unidos':'us','Paraguay':'py','Australia':'au','Turquía':'tr','Alemania':'de','Curazao':'cw','Costa de Marfil':'ci','Ecuador':'ec','Países Bajos':'nl','Japón':'jp','Suecia':'se','Túnez':'tn','Bélgica':'be','Egipto':'eg','Irán':'ir','Nueva Zelanda':'nz','España':'es','Cabo Verde':'cv','Arabia Saudita':'sa','Uruguay':'uy','Francia':'fr','Senegal':'sn','Irak':'iq','Noruega':'no','Argentina':'ar','Austria':'at','Argelia':'dz','Jordania':'jo','Portugal':'pt','Colombia':'co','Rep. Dem. Congo':'cd','Uzbekistán':'uz','Inglaterra':'gb-eng','Croacia':'hr','Ghana':'gh','Panamá':'pa'};
function flag(name){const c=TEAM_CODES[name];return c?`<span class="fi fi-${c}"></span>`:'';}

function calcPoints(pred,result){
  if(!pred||result===undefined||result===null)return null;
  if(pred.h===result.h&&pred.a===result.a)return 3;
  const w=s=>s.h>s.a?'H':s.h<s.a?'A':'D';
  return w(pred)===w(result)?1:0;
}

function generateMatches(teams){
  return DEFAULT_MATCHES.map(m=>{
    const ts=teams[m.group]||DEFAULT_TEAMS[m.group];
    return {...m,home:ts[m.hi],away:ts[m.ai]};
  });
}

function render(data){
  const lb=document.getElementById('loading-bar');
  if(lb){lb.style.width='100%';setTimeout(()=>lb.classList.add('done'),400);}

  if(!apodo){
    document.getElementById('main').innerHTML=`<div class="not-found"><h2>No se especificó participante</h2><p>Usa el link desde el tablero.</p></div>`;
    return;
  }

  const participants=(data.q26_participants&&Array.isArray(data.q26_participants))?data.q26_participants:Object.values(data.q26_participants||{});
  if(!participants.includes(apodo)){
    document.getElementById('main').innerHTML=`<div class="not-found"><h2>Participante no encontrado</h2><p>"${apodo}" no está en el tablero.</p></div>`;
    return;
  }

  const teams=data.q26_teams||DEFAULT_TEAMS;
  const matches=generateMatches(teams);
  const pp=(data.q26_predictions||{})[apodo]||{};
  const koPP=(data.q26_ko_preds||{})[apodo]||{};
  const results=data.q26_results||{};
  const koResults=data.q26_ko_results||{};
  const profile=(data.q26_profiles||{})[apodo]||{};
  const goalsMap=data.q26_goals||{};
  const hasResults=Object.keys(results).length>0;
  const hasKoResults=Object.keys(koResults).length>0;

  // Totals
  let groupPts=0,exactCount=0;
  matches.forEach(m=>{const pts=calcPoints(pp[m.id],results[m.id]);if(pts!==null){groupPts+=pts;if(pts===3)exactCount++;}});
  let koPts=0;
  KNOCKOUT_ROUNDS.forEach(r=>{
    const picks=koPP[r.id]||[];const actual=koResults[r.id]||[];
    if(!picks.length||!actual.length)return;
    koPts+=picks.filter(t=>actual.includes(t)).length*r.pts;
  });
  const totalPts=groupPts+koPts;
  const inicial=apodo.charAt(0).toUpperCase();

  // ── Profile card ──
  let html=`<div class="profile-card">
    <div class="profile-avatar">${inicial}</div>
    <div class="profile-info">
      <div class="profile-apodo">${apodo}</div>
      ${profile.nombre?`<div class="profile-nombre">${profile.nombre}</div>`:''}
    </div>
  </div>`;

  // Stats
  if(hasResults||hasKoResults){
    const golesVal=goalsMap[apodo]!==undefined?`<div class="stat-item"><span class="stat-val stat-blue">${goalsMap[apodo]}</span><span class="stat-label">goles pron.</span></div>`:'';
    html+=`<div class="stats-row" style="margin-bottom:20px">
      <div class="stat-item"><span class="stat-val stat-green">${totalPts}</span><span class="stat-label">pts total</span></div>
      <div class="stat-item"><span class="stat-val" style="color:var(--navy)">${groupPts}</span><span class="stat-label">grupos</span></div>
      <div class="stat-item"><span class="stat-val stat-gold">${koPts}</span><span class="stat-label">fase KO</span></div>
      <div class="stat-item"><span class="stat-val" style="color:var(--navy)">${exactCount}</span><span class="stat-label">exactos</span></div>
      ${golesVal}
    </div>`;
  }

  // ── Fase de Grupos ──
  html+=`<div class="section">
    <div class="section-header"><span>⚽</span> Fase de Grupos</div>
    <div class="section-body">`;

  const groups={};
  matches.forEach(m=>{if(!groups[m.group])groups[m.group]=[];groups[m.group].push(m);});
  Object.keys(groups).sort().forEach(g=>{
    html+=`<div class="group-block"><div class="group-title">Grupo ${g}</div>`;
    groups[g].forEach(m=>{
      const pred=pp[m.id];const res=results[m.id];const pts=calcPoints(pred,res);
      const predHtml=pred!==undefined
        ?`<span class="score-pill">${pred.h}-${pred.a}</span>${pts!==null?`<span class="pts pts-${pts}">${pts}p</span>`:''}`
        :`<span class="score-pill empty">—</span>`;
      const resHtml=res!==undefined?`<span class="result-badge">[${res.h}-${res.a}]</span>`:'';
      const hw=m.home.length>12?m.home.substring(0,12)+'…':m.home;
      const aw=m.away.length>12?m.away.substring(0,12)+'…':m.away;
      html+=`<div class="match-row">
        <div class="match-teams">${flag(m.home)}${hw} <span style="color:var(--muted)">vs</span> ${flag(m.away)}${aw}</div>
        <div class="match-pred">${predHtml} ${resHtml}</div>
      </div>`;
    });
    html+=`</div>`;
  });
  html+=`</div></div>`;

  // ── Fase Eliminatoria ──
  const anyKo=KNOCKOUT_ROUNDS.some(r=>(koPP[r.id]||[]).length>0);
  if(anyKo){
    html+=`<div class="section">
      <div class="section-header"><span>🏆</span> Fase Eliminatoria</div>
      <div class="section-body">`;
    KNOCKOUT_ROUNDS.forEach(r=>{
      const picks=koPP[r.id]||[];if(!picks.length)return;
      const actual=koResults[r.id]||[];
      const correct=actual.length?picks.filter(t=>actual.includes(t)).length:null;
      const pts=correct!==null?correct*r.pts:null;
      const badge=pts!==null
        ?`<span class="ko-pts-badge with-pts">${pts}pts (${correct}/${r.count}✓)</span>`
        :`<span class="ko-pts-badge pending">${picks.length} picks</span>`;
      html+=`<div class="ko-round">
        <div class="ko-round-header">
          <span class="ko-round-label">${r.label}</span>${badge}
        </div>
        <div class="ko-pills">`;
      picks.forEach(t=>{
        const cls=actual.length?(actual.includes(t)?'correct':'wrong'):'neutral';
        html+=`<span class="ko-pill ${cls}">${flag(t)} ${t}</span>`;
      });
      html+=`</div></div>`;
    });
    html+=`</div></div>`;
  }

  document.getElementById('main').innerHTML=html;
}

firebase.database().ref('/').once('value',snap=>{
  render(snap.val()||{});
});
