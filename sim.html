// Niveles de habilidad (por índice de participante)
// 0-8: expertos, 9-22: buenos, 23-35: promedio, 36-44: casuales
function skillLevel(i){
  if(i<9)return 'expert';
  if(i<23)return 'good';
  if(i<36)return 'avg';
  return 'casual';
}

// Hash determinista para generar números entre 0-1
function rng(seed){
  let s=seed^0x9e3779b9;
  s=Math.imul(s^(s>>>16),0x45d9f3b);
  s=Math.imul(s^(s>>>16),0x45d9f3b);
  return ((s^(s>>>16))>>>0)/4294967296;
}

// Genera una predicción basada en resultado real y nivel de habilidad
function genPred(actual,pIdx,mIdx){
  const r=rng(pIdx*1000+mIdx*7+13);
  const r2=rng(pIdx*997+mIdx*11+41);
  const sk=skillLevel(pIdx);

  // Probabilidades de acierto exacto / resultado correcto
  const pExact={expert:0.28,good:0.20,avg:0.12,casual:0.07}[sk];
  const pWinner={expert:0.65,good:0.55,avg:0.45,casual:0.35}[sk];

  const winner=actual.h>actual.a?'H':actual.h<actual.a?'A':'D';

  if(r<pExact){
    return{h:actual.h,a:actual.a};
  }else if(r<pWinner){
    // Resultado correcto, marcador diferente
    const alts={
      H:[{h:1,a:0},{h:2,a:0},{h:2,a:1},{h:3,a:1},{h:3,a:0},{h:1,a:0},{h:4,a:1}],
      A:[{h:0,a:1},{h:0,a:2},{h:1,a:2},{h:1,a:3},{h:0,a:1},{h:0,a:3}],
      D:[{h:0,a:0},{h:1,a:1},{h:2,a:2},{h:1,a:1},{h:0,a:0}]
    };
    const opts=alts[winner];
    const pick=opts[Math.floor(r2*opts.length)];
    // Evitar que sea exacto (ya lo cubrimos arriba)
    if(pick.h===actual.h&&pick.a===actual.a){
      return{h:actual.h+1,a:actual.a};
    }
    return pick;
  }else{
    // Resultado incorrecto
    const wrong={
      H:[{h:0,a:1},{h:1,a:1},{h:0,a:2},{h:1,a:2},{h:0,a:0}],
      A:[{h:1,a:0},{h:2,a:1},{h:1,a:1},{h:2,a:0},{h:3,a:1}],
      D:[{h:1,a:0},{h:0,a:1},{h:2,a:1},{h:1,a:2}]
    };
    const opts=wrong[winner];
    return opts[Math.floor(r2*opts.length)];
  }
}

// Selección aleatoria determinista de n elementos de un array
function pickN(arr,n,seed){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(rng(seed+i)*( i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a.slice(0,n);
}

// Genera picks eliminatorios por participante
function genKoPicks(pIdx){
  const sk=skillLevel(pIdx);
  const s=pIdx*31+17;

  // Probabilidad de acierto por ronda (qué tan bien predice los clasificados)
  const acc={
    r16:{expert:28,good:24,avg:20,casual:16}[sk],
    r8: {expert:13,good:11,avg: 9,casual: 6}[sk],
    r4: {expert: 7,good: 6,avg: 5,casual: 3}[sk],
    r2: {expert: 3,good: 3,avg: 2,casual: 1}[sk],
  };

  const allTeams=['México','Corea del Sur','Sudáfrica','Rep. Checa',
    'Canadá','Bosnia-Herzegovina','Catar','Suiza','Brasil','Marruecos','Haití','Escocia',
    'Estados Unidos','Paraguay','Australia','Turquía','Alemania','Curazao','Costa de Marfil',
    'Ecuador','Países Bajos','Japón','Suecia','Túnez','Bélgica','Egipto','Irán','Nueva Zelanda',
    'España','Cabo Verde','Arabia Saudita','Uruguay','Francia','Senegal','Irak','Noruega',
    'Argentina','Austria','Argelia','Jordania','Portugal','Colombia','Rep. Dem. Congo','Uzbekistán',
    'Inglaterra','Croacia','Ghana','Panamá'];

  // r16: 32 equipos
  const r16correct=acc.r16;
  const r16wrong=32-r16correct;
  const notR16=allTeams.filter(t=>!KO_RESULTS.r16.includes(t));
  const r16=[
    ...pickN(KO_RESULTS.r16,r16correct,s+1),
    ...pickN(notR16,r16wrong,s+2)
  ];

  // r8: 16 equipos
  const r8correct=acc.r8;
  const r8wrong=16-r8correct;
  const notR8=KO_RESULTS.r16.filter(t=>!KO_RESULTS.r8.includes(t));
  const r8=[
    ...pickN(KO_RESULTS.r8,r8correct,s+3),
    ...pickN(notR8,r8wrong,s+4)
  ];

  // r4: 8 equipos
  const r4correct=acc.r4;
  const r4wrong=8-r4correct;
  const notR4=KO_RESULTS.r8.filter(t=>!KO_RESULTS.r4.includes(t));
  const r4=[
    ...pickN(KO_RESULTS.r4,r4correct,s+5),
    ...pickN(notR4,r4wrong,s+6)
  ];

  // r2: 4 equipos
  const r2correct=acc.r2;
  const r2wrong=4-r2correct;
  const notR2=KO_RESULTS.r4.filter(t=>!KO_RESULTS.r2.includes(t));
  const r2=[
    ...pickN(KO_RESULTS.r2,r2correct,s+7),
    ...pickN(notR2,r2wrong,s+8)
  ];

  // rf: 2 finalistas
  const rfOpts=['Brasil','Argentina','Francia','España','Alemania','Portugal','Inglaterra','México'];
  const rfPick1=rng(s+9)<0.55?'Brasil':(rng(s+10)<0.5?'Argentina':'Francia');
  const rfPick2=rfPick1==='Brasil'?(rng(s+11)<0.6?'Argentina':'España'):(rng(s+12)<0.5?'Brasil':'España');
  const rf=[rfPick1,rfPick2];

  // rc: campeón
  const champs=['Brasil','Argentina','Francia','España','Alemania','Portugal','Inglaterra'];
  const r_champ=rng(s+13);
  const rc=[r_champ<0.40?'Brasil':r_champ<0.65?'Argentina':r_champ<0.78?'Francia':r_champ<0.87?'España':
    champs[Math.floor(rng(s+14)*champs.length)]];

  return{r16,r8,r4,r2,rf,rc};
}

  log('');

  const updates={};

  // Lista de participantes y bloqueados
  updates['q26_participants']=apodos;
  updates['q26_locked']=apodos;

  updates['q26_results']=RESULTS;

    updates[`q26_goals/${p.apodo}`]=p.goles;
    updates[`q26_payments/${p.apodo}`]=p.pago;

    // Predicciones de grupos (72 partidos)
    const preds={};
    matchIds.forEach((mid,mi)=>{preds[mid]=genPred(RESULTS[mid],i,mi);});
    updates[`q26_predictions/${p.apodo}`]=preds;

    // Picks eliminatorios
    updates[`q26_ko_preds/${p.apodo}`]=genKoPicks(i);

    log(`  ✓ ${p.apodo.padEnd(10)} (${skillLevel(i).padEnd(6)}) — ${p.pago}`,'ok');
  });

  log('');
  log('📤 Subiendo a Firebase...','info');

  try{
    await db.ref('/').update(updates);

    const totalGoles=Object.values(RESULTS).reduce((s,r)=>s+r.h+r.a,0);
    const bolsa=PARTICIPANTS.length*3000;

    log('');
    log('════════════════════════════════','ok');
    log('  ✅ SIMULACIÓN COMPLETADA','ok');
    log('════════════════════════════════','ok');
    log(`  👥 ${PARTICIPANTS.length} participantes registrados`,'ok');
    log(`  ⚽ ${Object.keys(RESULTS).length} partidos con resultados`,'ok');
    log(`  🥅 ${totalGoles} goles en fase de grupos`,'ok');
    log(`  🏆 Campeón: Brasil`,'ok');
    log(`  🥈 Subcampeón: Argentina`,'ok');
    log(`  💰 Bolsa: $${bolsa.toLocaleString('es-MX')} MXN`,'ok');
    log('');
    log('  🌐 Ve al tablero para ver el ranking completo.','info');

    const s=document.getElementById('summary');
    s.style.display='block';
    document.getElementById('s1').textContent=`👥 ${PARTICIPANTS.length} participantes — Bolsa: $${bolsa.toLocaleString('es-MX')} MXN`;
    document.getElementById('s2').textContent=`⚽ ${totalGoles} goles en fase de grupos (72 partidos)`;
    document.getElementById('s3').textContent=`🏆 Campeón: Brasil | Subcampeón: Argentina | 3er: Francia | 4to: España`;
    document.getElementById('s4').textContent=`📊 Ranking activo en quiniela.tarreola.com`;

    btn.textContent='✅ Completado';
  }catch(e){
    log('❌ Error: '+e.message,'err');
    btn.disabled=false;btn.textContent='▶ Reintentar';
  }
}

async function clearAll(){
  if(!confirm('⚠️ Esto borrará TODOS los datos de Firebase. ¿Continuar?'))return;
  document.getElementById('log').innerHTML='';
  log('🗑 Limpiando todos los datos...','warn');
  try{
    await db.ref('/').set({});
    log('✅ Datos eliminados. Firebase está vacío.','ok');
  }catch(e){
    log('❌ Error: '+e.message,'err');
  }
}
</script>
